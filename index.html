<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css" />
    <title>Meme Generator</title>
</head>
<body onload="onInit()">
    <Header>Meme Generator</Header>
    <div class="canvas-container">
        <canvas width="200" height="400">
        </canvas>
    </div>
 

 <sect class="editor">
     <input class="canvastext" type="text" placeholder="Enter text here." onInput=" setLineTxt(this)">
     <input class="color-picker" type="color" value="#000000" oninput="onSetColor(this.value)" />
     <button onclick="increaseTextSize()">Increase text size</button>
     <button onclick="decreaseTextSize()">Decrease text size</button>
     <button onclick="switchLine()">Switch line</button>
     <button onclick="addLine()">Add line</button>
 </sect>

<a href="#" class="btn" onclick="onDownloadImg(this)" download="my-meme.jpg">Download Meme</a>

 <sect class="gallery modal hidden">
  <!-- <img src="meme-imgs\meme-imgs (square)\1.jpg" alt="">
  <img src="meme-imgs\meme-imgs (square)\2.jpg" alt=""> -->
 </sect>


    <script src="js/memeService.js"></script>
    <script src="js/memeController.js"></script>
    <script src="js/galleryController.js"></script>
</body>
</html>
